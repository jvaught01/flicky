name: Build & Release

on:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win
          - os: ubuntu-latest
            platform: linux

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Package (${{ matrix.platform }})
        # Only auto-publish to GitHub Releases on tag pushes; otherwise
        # build the artifact and stop so PR / branch runs don't try to
        # upload to a non-existent draft release.
        run: bunx electron-builder --${{ matrix.platform }} --publish ${{ startsWith(github.ref, 'refs/tags/v') && 'always' || 'never' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Skip macOS code signing in CI. CSC_LINK="" (empty but defined)
          # confuses electron-builder into treating cwd as a cert file.
          # When real signing secrets are added later, swap this for
          # conditional CSC_LINK/CSC_KEY_PASSWORD/APPLE_* env vars.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'

      - name: Upload artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: flicky-${{ matrix.platform }}
          if-no-files-found: ignore
          path: |
            release/*.dmg
            release/*.zip
            release/*.exe
            release/*.AppImage
            release/*.deb

  release:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            *.dmg
            *.zip
            *.exe
            *.AppImage
            *.deb
          generate_release_notes: true
